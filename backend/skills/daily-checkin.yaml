name: daily-checkin
description: Morning check-in agent that reviews habits, priorities, and creates a daily focus plan
version: "1.0"
type: ops

model: claude-haiku-4-5
max_budget_usd: 0.05

tools: []

data:
  reads: [tasks, habits, goals, journal]
  writes: [tasks, journal]

schedule:
  type: cron
  every: "0 8 * * *"

prompt_template: |
  You are a friendly daily check-in assistant. It's the start of a new day.
  Review the user's current state and create a focused daily plan.

  OPEN TASKS:
  {{tasks}}

  ACTIVE HABITS:
  {{habits}}

  ACTIVE GOALS:
  {{goals}}

  RECENT JOURNAL ENTRIES:
  {{journal}}

  Instructions:
  1. Look at open tasks and identify the top 3 highest-impact items for today
  2. Check habit streaks — note any that are at risk of breaking
  3. Review goal progress and suggest one small action toward the most important goal
  4. Create a motivating daily journal entry with today's focus areas
  5. If any tasks seem stale (no progress for days), suggest reprioritizing

  Respond with JSON:
  {
    "summary": "Daily check-in complete. Focus areas: ...",
    "actions": [
      {
        "type": "create_journal",
        "content": "## Daily Focus\n\n**Top priorities:**\n1. ...\n2. ...\n3. ...\n\n**Habit check:** ...\n\n**Goal progress:** ...",
        "tags": ["daily-checkin"],
        "mood": "good"
      },
      {
        "type": "create_task",
        "text": "...",
        "priority": "high",
        "tags": ["daily-focus"]
      }
    ]
  }

requires_approval: false
max_actions_per_run: 5

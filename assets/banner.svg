<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00ffc8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffc8" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#00ffc8" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Connection lines -->
  <g stroke="#00ffc8" stroke-opacity="0.2" stroke-width="1" fill="none">
    <path d="M 300 200 Q 450 140 600 170"/>
    <path d="M 600 170 Q 750 140 900 200"/>
    <path d="M 300 200 Q 450 260 600 230"/>
    <path d="M 600 230 Q 750 260 900 200"/>
  </g>

  <!-- Node dots -->
  <g fill="#00ffc8" filter="url(#neon)">
    <circle cx="300" cy="200" r="4" opacity="0.6"/>
    <circle cx="420" cy="155" r="3" opacity="0.4"/>
    <circle cx="480" cy="245" r="3" opacity="0.4"/>
    <circle cx="600" cy="170" r="4" opacity="0.6"/>
    <circle cx="600" cy="230" r="4" opacity="0.6"/>
    <circle cx="720" cy="155" r="3" opacity="0.4"/>
    <circle cx="780" cy="245" r="3" opacity="0.4"/>
    <circle cx="900" cy="200" r="4" opacity="0.6"/>
  </g>

  <!-- Icons area -->
  <!-- Brain icon (left) -->
  <g transform="translate(180, 170)" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.5">
    <circle cx="0" cy="0" r="16"/>
    <path d="M-6,-8 Q-6,0 0,0 Q6,0 6,-8" />
    <path d="M-8,2 Q-4,8 0,4 Q4,8 8,2"/>
  </g>

  <!-- Checklist icon (top) -->
  <g transform="translate(600, 90)" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.5">
    <rect x="-12" y="-12" width="24" height="24" rx="3"/>
    <polyline points="-6,-2 -2,2 6,-6"/>
    <line x1="-6" y1="6" x2="6" y2="6"/>
  </g>

  <!-- Rocket icon (bottom left) -->
  <g transform="translate(380, 310)" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.5">
    <path d="M0,-12 Q8,-4 0,12 Q-8,-4 0,-12Z"/>
    <line x1="-6" y1="8" x2="-10" y2="14"/>
    <line x1="6" y1="8" x2="10" y2="14"/>
  </g>

  <!-- Bot icon (right) -->
  <g transform="translate(1020, 170)" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.5">
    <rect x="-12" y="-8" width="24" height="20" rx="4"/>
    <circle cx="-5" cy="0" r="2.5"/>
    <circle cx="5" cy="0" r="2.5"/>
    <line x1="0" y1="-14" x2="0" y2="-8"/>
    <circle cx="0" cy="-16" r="2"/>
  </g>

  <!-- Book icon (top right) -->
  <g transform="translate(820, 100)" fill="none" stroke="#00ffc8" stroke-width="1.5" opacity="0.5">
    <path d="M0,-10 Q-12,-10 -12,0 L-12,10 Q-12,8 0,8"/>
    <path d="M0,-10 Q12,-10 12,0 L12,10 Q12,8 0,8"/>
    <line x1="0" y1="-10" x2="0" y2="8"/>
  </g>

  <!-- Title -->
  <text x="600" y="195" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="48" fill="#00ffc8" filter="url(#neon)" letter-spacing="8">
    MISSION CONTROL
  </text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="16" fill="#00ffc8" opacity="0.6" letter-spacing="3">
    YOUR AI-POWERED COMMAND CENTER
  </text>

  <!-- Bottom dashboard mockup bars -->
  <g transform="translate(350, 340)" opacity="0.3">
    <rect x="0" y="0" width="60" height="20" rx="2" fill="#00ffc8" opacity="0.3"/>
    <rect x="70" y="5" width="40" height="15" rx="2" fill="#00ffc8" opacity="0.2"/>
    <rect x="120" y="3" width="50" height="17" rx="2" fill="#00ffc8" opacity="0.25"/>
    <rect x="180" y="8" width="35" height="12" rx="2" fill="#00ffc8" opacity="0.15"/>
    <rect x="225" y="2" width="55" height="18" rx="2" fill="#00ffc8" opacity="0.2"/>
    <rect x="290" y="6" width="45" height="14" rx="2" fill="#00ffc8" opacity="0.25"/>
    <rect x="345" y="0" width="60" height="20" rx="2" fill="#00ffc8" opacity="0.15"/>
    <rect x="415" y="4" width="40" height="16" rx="2" fill="#00ffc8" opacity="0.2"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#00ffc8" stroke-opacity="0.15" stroke-width="1" fill="none">
    <polyline points="20,60 20,20 60,20"/>
    <polyline points="1140,20 1180,20 1180,60"/>
    <polyline points="20,340 20,380 60,380"/>
    <polyline points="1140,380 1180,380 1180,340"/>
  </g>
</svg>
